<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner VIS-BALI</title>
    <!-- Library ZXing -->
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --pulang: #f97316;
            --jemput: #0ea5e9;
            --error: #ef4444;
            --warning: #f59e0b;
            --dark-bg: #0f172a;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; justify-content: center; 
            height: 100vh; overflow: hidden; 
        }

        /* Container utama: Terpusat & Responsif */
        .main-wrapper {
            width: 100%;
            max-width: 480px; /* Batas lebar di layar besar/Desktop */
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--dark-bg);
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .scanner-container {
            position: relative; 
            width: 100%; 
            flex: 1;
            background: #000;
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
        }

        #video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlay Lubang Intip */
        .overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none;
            z-index: 5;
        }

        .scan-box {
            width: 260px; height: 260px; 
            border-radius: 35px; position: relative;
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.6); /* Area luar kotak gelap */
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Bingkai Sudut Kotak */
        .corner {
            position: absolute; width: 45px; height: 45px;
            border: 4px solid var(--primary);
            transition: border-color 0.3s;
        }
        .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-radius: 28px 0 0 0; }
        .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-radius: 0 28px 0 0; }
        .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-radius: 0 0 0 28px; }
        .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-radius: 0 0 28px 0; }

        /* Animasi Garis Scan */
        .scan-line {
            position: absolute; width: 90%; left: 5%; height: 3px;
            background: var(--primary); top: 10%; 
            box-shadow: 0 0 15px var(--primary);
            border-radius: 50%;
            animation: moveScan 2.5s infinite ease-in-out;
        }

        @keyframes moveScan {
            0%, 100% { top: 10%; opacity: 0.2; }
            50% { top: 90%; opacity: 1; }
        }

        /* Feedback Flash Layar */
        .flash-success { background: rgba(16, 185, 129, 0.25); }
        .flash-error { background: rgba(239, 68, 68, 0.25); }

        /* Panel Kontrol Bawah */
        .ui-panel {
            width: 100%; background: #1e293b; padding: 20px 25px 35px;
            border-radius: 35px 35px 0 0; text-align: center;
            z-index: 10; border-top: 1px solid rgba(255,255,255,0.1);
        }

        #status { font-weight: 800; font-size: 1.2rem; color: var(--primary); margin-bottom: 4px; }
        #detail { font-size: 0.9rem; color: #94a3b8; min-height: 1.2rem; }

        /* Toast Notifikasi Hasil */
        #result-toast {
            margin-top: 15px;
            padding: 14px;
            border-radius: 18px;
            display: none;
            font-weight: 700;
            font-size: 0.9rem;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .toast-datang { background: rgba(16, 185, 129, 0.15); border: 1px solid var(--success); color: var(--success); }
        .toast-pulang { background: rgba(249, 115, 22, 0.15); border: 1px solid var(--pulang); color: var(--pulang); }
        .toast-jemput { background: rgba(14, 165, 233, 0.15); border: 1px solid var(--jemput); color: var(--jemput); }
        .toast-error { background: rgba(239, 68, 68, 0.15); border: 1px solid var(--error); color: var(--error); }

        .btn-group { display: flex; gap: 12px; margin-top: 20px; }
        button { 
            flex: 1; padding: 15px; border-radius: 16px; border: none; 
            font-weight: 700; cursor: pointer; font-size: 0.8rem;
            background: #334155; color: white; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        button.primary { background: var(--primary); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        button:active { transform: scale(0.95); opacity: 0.9; }

        .pulse-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; display: inline-block; margin-right: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.6); opacity: 0.4; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="scanner-container">
            <video id="video"></video>
            <div class="overlay" id="overlay">
                <div class="scan-box" id="scan-box">
                    <div class="corner tl"></div><div class="corner tr"></div>
                    <div class="corner bl"></div><div class="corner br"></div>
                    <div class="scan-line"></div>
                </div>
            </div>
        </div>

        <div class="ui-panel">
            <div id="status"><span class="pulse-dot"></span> MENUNGGU...</div>
            <div id="detail">Arahkan kamera ke QR Code Siswa</div>
            
            <!-- Toast Hasil Verifikasi -->
            <div id="result-toast"></div>
            
            <div class="btn-group">
                <button onclick="switchCamera()">🔄 Kamera</button>
                <button onclick="location.reload()">Reset</button>
                <button class="primary" onclick="window.close()">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        const codeReader = new ZXing.BrowserQRCodeReader();
        const statusEl = document.getElementById('status');
        const detailEl = document.getElementById('detail');
        const toastEl = document.getElementById('result-toast');
        const overlay = document.getElementById('overlay');
        const corners = document.querySelectorAll('.corner');
        
        let videoDevices = [];
        let currentDeviceIndex = 0;
        let isProcessing = false;

        async function initCamera() {
            try {
                videoDevices = await codeReader.listVideoInputDevices();
                if (videoDevices.length === 0) throw "Kamera tidak ditemukan";
                
                // Gunakan kamera belakang jika ada
                currentDeviceIndex = videoDevices.length > 1 ? 1 : 0;
                startScanning();
            } catch (err) {
                statusEl.innerText = "ERROR KAMERA";
                statusEl.style.color = "var(--error)";
                detailEl.innerText = err;
            }
        }

        function startScanning() {
            const selectedDeviceId = videoDevices[currentDeviceIndex].deviceId;
            codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
                if (result && !isProcessing) {
                    handleDetectedQR(result.text);
                }
            });
            statusEl.innerHTML = '<span class="pulse-dot"></span> SIAP MEMINDAI';
            statusEl.style.color = "var(--primary)";
            detailEl.innerText = "Arahkan kamera ke QR Code Siswa";
            updateCornerColor('var(--primary)');
        }

        function handleDetectedQR(nisn) {
            if (isProcessing) return;
            isProcessing = true; 
            
            statusEl.innerText = "QR TERDETEKSI";
            statusEl.style.color = "var(--warning)";
            detailEl.innerText = "Sedang memverifikasi data...";
            updateCornerColor('var(--warning)');
            
            const msgData = {
                type: 'QR_SCAN_RESULT',
                nisn: nisn.trim(),
                ts: Date.now()
            };

            // Kirim ke Sistem Utama
            if (window.opener) {
                window.opener.postMessage(msgData, "*");
                window.opener.postMessage({...msgData, type: 'DH_QR_SCAN_RESULT'}, "*");
            }

            // FAILSAFE: Jika sistem tidak merespon dalam 6 detik, reset kamera
            setTimeout(() => { 
                if(isProcessing) {
                    isProcessing = false;
                    startScanning();
                }
            }, 6000);
        }

        // Menerima Jawaban dari Sistem Utama (Google Apps Script)
        window.addEventListener('message', (event) => {
            const data = event.data;
            if (!data.type) return;

            // Jika Respon Sukses (Datang / Pulang / Jemput)
            if (data.type === 'SCAN_SUCCESS' || data.type === 'DH_SCAN_SUCCESS') {
                let scanType = 'datang';
                const msgLower = (data.message || '').toLowerCase();
                
                if (msgLower.includes('jemput')) scanType = 'jemput';
                else if (msgLower.includes('pulang')) scanType = 'pulang';
                
                showFeedback('success', data.nama || 'BERHASIL', data.message || 'Data Tersimpan', scanType);
            } 
            // Jika Respon Gagal (Sudah dijemput / Duplikat / Error Server)
            else if (data.type === 'SCAN_ERROR' || data.type === 'DH_SCAN_ERROR' || data.type === 'SCAN_DUPLICATE') {
                showFeedback('error', 'DITOLAK', data.message || 'Gagal Memproses', 'error');
            }
        });

        function showFeedback(status, title, message, type) {
            isProcessing = true;
            playBeep(status);
            
            statusEl.innerText = title;
            statusEl.style.color = status === 'success' ? 'var(--success)' : 'var(--error)';
            detailEl.innerText = status === 'success' ? "Data Verifikasi Cocok" : "Verifikasi Gagal";
            updateCornerColor(status === 'success' ? 'var(--success)' : 'var(--error)');
            
            // Tampilkan Notifikasi Toast
            toastEl.style.display = 'block';
            toastEl.className = 'toast-' + (status === 'success' ? type : 'error');
            
            let icon = '✅';
            if (type === 'pulang') icon = '🏠';
            if (type === 'jemput') icon = '👨‍👩‍👧';
            if (status === 'error') icon = '⚠️';

            toastEl.innerHTML = `<span>${icon} ${message}</span>`;
            overlay.classList.add(status === 'success' ? 'flash-success' : 'flash-error');
            
            // Tampilkan hasil selama 3 detik, lalu scan lagi
            setTimeout(() => {
                overlay.className = 'overlay';
                toastEl.style.display = 'none';
                isProcessing = false;
                startScanning();
            }, 3000);
        }

        function updateCornerColor(color) {
            corners.forEach(c => c.style.borderColor = color);
        }

        function playBeep(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(type === 'success' ? 880 : 220, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } catch(e) {}
        }

        async function switchCamera() {
            if (videoDevices.length > 1) {
                currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
                codeReader.reset();
                startScanning();
            }
        }

        document.addEventListener('DOMContentLoaded', initCamera);
    </script>
</body>
</html>
