<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Absensi - VIS-BALI</title>
    <!-- Library ZXing untuk Scan QR -->
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.20.0/umd/index.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; background: #0f172a; color: white; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; 
        }

        /* Video Container */
        .scanner-container {
            position: relative; width: 100%; flex: 1;
            display: flex; align-items: center; justify-content: center;
            background: #000;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlay Garis Scan */
        .overlay {
            position: absolute; inset: 0;
            border: 2px solid transparent; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .scan-box {
            width: 260px; height: 260px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px; position: relative;
        }
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: var(--primary); top: 0; box-shadow: 0 0 15px var(--primary);
            animation: moveScan 2s infinite linear;
        }
        @keyframes moveScan {
            0% { top: 0; } 50% { top: 100%; } 100% { top: 0; }
        }

        /* Feedback Flash */
        .flash-success { border: 10px solid var(--success) !important; background: rgba(16, 185, 129, 0.1); }
        .flash-error { border: 10px solid var(--error) !important; background: rgba(239, 68, 68, 0.1); }

        /* Status UI */
        .ui-panel {
            width: 100%; background: #1e293b; padding: 20px;
            border-radius: 25px 25px 0 0; text-align: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 10;
        }
        h2 { margin: 0 0 10px 0; font-size: 1.1rem; color: #cbd5e1; }
        #status { font-weight: bold; font-size: 1.2rem; color: var(--primary); margin-bottom: 5px; }
        #detail { font-size: 0.9rem; color: #94a3b8; height: 1.2rem; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; width: 100%; }
        button { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; 
            font-weight: bold; cursor: pointer; font-size: 0.9rem;
            background: #334155; color: white; transition: 0.2s;
        }
        button.primary { background: var(--primary); }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="scanner-container">
        <video id="video"></video>
        <div class="overlay" id="overlay">
            <div class="scan-box">
                <div class="scan-line"></div>
            </div>
        </div>
    </div>

    <div class="ui-panel">
        <div id="status">Mencari Kamera...</div>
        <div id="detail">Arahkan ke QR Code Siswa</div>
        
        <div class="btn-group">
            <button onclick="toggleCamera()">🔄 Ganti Kamera</button>
            <button onclick="location.reload()">Reset</button>
            <button class="primary" onclick="window.close()">Tutup</button>
        </div>
    </div>

    <script>
        const codeReader = new ZXing.BrowserQRCodeReader();
        const statusEl = document.getElementById('status');
        const detailEl = document.getElementById('detail');
        const overlay = document.getElementById('overlay');
        
        let selectedDeviceId;
        let isProcessing = false;

        // 1. Inisialisasi Kamera
        async function initCamera() {
            try {
                const videoDevices = await ZXing.BrowserCodeReader.listVideoInputDevices();
                if (videoDevices.length === 0) throw "Kamera tidak ditemukan";
                
                // Pilih kamera belakang secara default
                selectedDeviceId = videoDevices.length > 1 ? videoDevices[1].deviceId : videoDevices[0].deviceId;
                startScanning();
            } catch (err) {
                statusEl.innerText = "Error";
                detailEl.innerText = err;
            }
        }

        function startScanning() {
            codeReader.decodeFromVideoDevice(selectedDeviceId, 'video', (result, err) => {
                if (result && !isProcessing) {
                    processResult(result.text);
                }
            });
            statusEl.innerText = "Siap Scan";
        }

        // 2. Kirim ke Parent (Google Apps Script)
        function processResult(nisn) {
            isProcessing = true;
            statusEl.innerText = "QR Terdeteksi";
            statusEl.style.color = "var(--warning)";
            
            if (window.opener) {
                window.opener.postMessage({
                    type: 'QR_SCAN_RESULT',
                    nisn: nisn.trim(),
                    ts: Date.now()
                }, "*");
            } else {
                alert("Koneksi ke Dashboard terputus. Silakan buka ulang scanner.");
            }

            // Timeout keamanan jika tidak ada respon dari Apps Script dalam 5 detik
            setTimeout(() => { isProcessing = false; }, 5000);
        }

        // 3. Terima Feedback dari Parent
        window.addEventListener('message', (event) => {
            // Kita terima data seperti: {type: 'SCAN_SUCCESS', nama: 'Budi', message: 'Hadir'}
            const data = event.data;
            isProcessing = false; // Buka kunci scan

            if (data.type === 'SCAN_SUCCESS' || data.type === 'SCAN_DUPLICATE') {
                showFeedback(data.type === 'SCAN_SUCCESS' ? 'success' : 'error', data.nama, data.message || '');
            } else if (data.type === 'SCAN_ERROR') {
                showFeedback('error', 'Gagal', data.message || 'Siswa tidak ditemukan');
            }
        });

        function showFeedback(type, title, message) {
            playBeep(type);
            
            // UI Feedback
            statusEl.innerText = title;
            statusEl.style.color = type === 'success' ? 'var(--success)' : 'var(--error)';
            detailEl.innerText = message;
            
            // Visual Flash
            overlay.classList.add(type === 'success' ? 'flash-success' : 'flash-error');
            
            setTimeout(() => {
                overlay.className = 'overlay';
                statusEl.innerText = "Siap Scan Berikutnya";
                statusEl.style.color = "var(--primary)";
                detailEl.innerText = "Arahkan ke QR Code Siswa";
            }, 2500);
        }

        function playBeep(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(type === 'success' ? 880 : 220, ctx.currentTime);
            
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 0.2);
        }

        async function toggleCamera() {
            const videoDevices = await ZXing.BrowserCodeReader.listVideoInputDevices();
            if (videoDevices.length > 1) {
                // Cari device id yang sedang tidak digunakan
                const newDevice = videoDevices.find(d => d.deviceId !== selectedDeviceId);
                selectedDeviceId = newDevice.deviceId;
                codeReader.reset();
                startScanning();
            }
        }

        // Jalankan saat load
        initCamera();
    </script>
</body>
</html>
